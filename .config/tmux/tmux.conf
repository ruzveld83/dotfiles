# -----------------------------------------------------------------------------
# Options
# -----------------------------------------------------------------------------
set -g prefix C-f
set -g mouse on

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------
unbind C-b
bind C-f send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind q confirm-before -p "kill-session #S? (y/n)" kill-session
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."
