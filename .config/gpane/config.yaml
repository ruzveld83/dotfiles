projects:
  # --- The Tab Container ---
  doc-rag:
    layout: tabs
    commands:
      - "opencode ~/Projects/01-doc-rag"
      - "gpane doc-rag-splits --here"
      - "cd ~/Projects/01-doc-rag"

  # --- The Split Layout (Injected into Tab 2) ---
  doc-rag-tab-2:
    layout: 2-1
    commands:
      - "cd ~/Projects/01-doc-rag && make run"
      - "cd ~/Projects/01-doc-rag && tail -f logs/indexer.log"
      - "cd ~/Projects/01-doc-rag && make grpcui"
